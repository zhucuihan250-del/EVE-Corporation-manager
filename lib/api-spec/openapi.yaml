openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: EVE Online PAP Tracking System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: characters
    description: EVE character management
  - name: fleets
    description: Fleet management
  - name: pap
    description: PAP records management
  - name: rewards
    description: Reward management
  - name: redemptions
    description: Redemption management
  - name: dashboard
    description: Dashboard summary endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Completely delete a user and all their data (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/pap:
    patch:
      operationId: adjustUserPap
      tags: [users]
      summary: Manually adjust user PAP (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustPapBody"
      responses:
        "200":
          description: Adjustment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: List characters for the current user
      responses:
        "200":
          description: List of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"

  /characters/all:
    get:
      operationId: listAllCharacters
      tags: [characters]
      summary: List all characters (admin only)
      responses:
        "200":
          description: List of all characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"

  /characters/{id}:
    delete:
      operationId: deleteCharacter
      tags: [characters]
      summary: Delete a character record (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Character deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/characters:
    get:
      operationId: getUserCharacters
      tags: [characters]
      summary: Get all characters for a specific user (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of characters for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"

  /fleets:
    get:
      operationId: listFleets
      tags: [fleets]
      summary: List all fleets
      responses:
        "200":
          description: List of fleets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fleet"
    post:
      operationId: createFleet
      tags: [fleets]
      summary: Register a new fleet (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFleetBody"
      responses:
        "201":
          description: Created fleet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fleet"

  /fleets/{id}:
    get:
      operationId: getFleet
      tags: [fleets]
      summary: Get a fleet by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fleet details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fleet"
        "404":
          description: Fleet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFleet
      tags: [fleets]
      summary: Update a fleet (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFleetBody"
      responses:
        "200":
          description: Updated fleet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fleet"
    delete:
      operationId: deleteFleet
      tags: [fleets]
      summary: Delete a fleet (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Fleet deleted

  /fleets/{id}/scan:
    post:
      operationId: scanFleetMembers
      tags: [fleets]
      summary: Scan ESI fleet members and auto-award PAP (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanFleetResponse"
        "400":
          description: Fleet has no EVE fleet ID or is not active
        "403":
          description: Forbidden
        "502":
          description: ESI request failed

  /fleets/{id}/participants:
    post:
      operationId: addFleetParticipant
      tags: [fleets]
      summary: Add a character to a fleet and award PAP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddParticipantBody"
      responses:
        "201":
          description: Participant added and PAP awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PapRecord"

  /battle-reports:
    get:
      operationId: listBattleReports
      tags: [battle-reports]
      summary: List fleet battle reports (all authenticated members)
      responses:
        "200":
          description: Battle report summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BattleReportSummary"

  /battle-reports/{id}:
    get:
      operationId: getBattleReport
      tags: [battle-reports]
      summary: Get a fleet battle report (all authenticated members)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Battle report with fleet and killmail details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleReportDetail"
        "404":
          description: Battle report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /battle-reports/{id}/refresh:
    post:
      operationId: refreshBattleReport
      tags: [battle-reports]
      summary: Re-sync a fleet battle report (FC and above)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Battle report refresh queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status

  /command/battle-replays:
    get:
      operationId: listBattleReplays
      tags: [battle-replays]
      summary: List battle reports with FC review status (FC and above)
      responses:
        "200":
          description: Battle reports available for command review
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BattleReplaySummary"
        "403":
          description: FC role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /command/battle-replays/{id}:
    get:
      operationId: getBattleReplay
      tags: [battle-replays]
      summary: Get the complete FC battle-review workbench (FC and above)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Battle report and private review draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleReplayDetail"
        "404":
          description: Battle report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBattleReplay
      tags: [battle-replays]
      summary: Save or publish FC nodes, annotations, and conclusion (FC and above)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBattleReplayBody"
      responses:
        "200":
          description: Saved battle review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleReview"
        "400":
          description: Invalid review content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /command/battle-replays/{id}/analyze:
    post:
      operationId: analyzeBattleReplay
      tags: [battle-replays]
      summary: Run evidence-based AI battle analysis (FC and above)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Analysis queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [generating]
                required:
                  - status
        "404":
          description: Battle report not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pap:
    get:
      operationId: listPapRecords
      tags: [pap]
      summary: List PAP records for current user
      responses:
        "200":
          description: List of PAP records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PapRecord"

  /pap/all:
    get:
      operationId: listAllPapRecords
      tags: [pap]
      summary: List all PAP records (admin only)
      responses:
        "200":
          description: All PAP records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PapRecord"

  /pap/manual:
    post:
      operationId: createManualPap
      tags: [pap]
      summary: Manually create a PAP adjustment (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManualPapBody"
      responses:
        "201":
          description: Manual PAP record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PapRecord"

  /rewards:
    get:
      operationId: listRewards
      tags: [rewards]
      summary: List all available rewards
      responses:
        "200":
          description: List of rewards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"
    post:
      operationId: createReward
      tags: [rewards]
      summary: Create a new reward (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRewardBody"
      responses:
        "201":
          description: Created reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reward"

  /rewards/{id}:
    patch:
      operationId: updateReward
      tags: [rewards]
      summary: Update a reward (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRewardBody"
      responses:
        "200":
          description: Updated reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reward"
    delete:
      operationId: deleteReward
      tags: [rewards]
      summary: Delete a reward (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Reward deleted
        "404":
          description: Reward not found

  /redemptions:
    get:
      operationId: listRedemptions
      tags: [redemptions]
      summary: List redemption history for current user
      responses:
        "200":
          description: List of redemptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"
    post:
      operationId: createRedemption
      tags: [redemptions]
      summary: Redeem a reward using PAP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRedemptionBody"
      responses:
        "201":
          description: Redemption successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Redemption"
        "400":
          description: Invalid request, insufficient PAP, unavailable reward, or depleted stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Corporation tenure or per-user redemption limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Corporation join date could not be verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /redemptions/all:
    get:
      operationId: listAllRedemptions
      tags: [redemptions]
      summary: List all redemptions (admin only)
      responses:
        "200":
          description: All redemptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"

  /redemptions/{id}:
    patch:
      operationId: updateRedemption
      tags: [redemptions]
      summary: Update a redemption status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRedemptionBody"
      responses:
        "200":
          description: Updated redemption
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Redemption"
        "404":
          description: Redemption not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get summary stats for current user dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/admin-summary:
    get:
      operationId: getAdminSummary
      tags: [dashboard]
      summary: Get admin-level summary stats (admin only)
      responses:
        "200":
          description: Admin summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"

  /dashboard/top-contributors:
    get:
      operationId: getTopContributors
      tags: [dashboard]
      summary: Get top contributors ordered by fleet participation count
      responses:
        "200":
          description: Top contributors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopContributor"

  /dashboard/top-contributors/30-days:
    get:
      operationId: getTopContributors30Days
      tags: [dashboard]
      summary: Get top contributors for the rolling last 30 days
      responses:
        "200":
          description: Top contributors during the last 30 days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopContributor"

  /dashboard/recent-fleets:
    get:
      operationId: getRecentFleets
      tags: [dashboard]
      summary: Get recent fleet activity
      responses:
        "200":
          description: Recent fleets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fleet"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List upcoming fleet announcements
      responses:
        "200":
          description: Announcements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create a fleet announcement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "403":
          description: Forbidden

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete a fleet announcement (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Announcement deleted
        "403":
          description: Forbidden

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        eveCharacterId:
          type: ["integer", "null"]
        eveCharacterName:
          type: ["string", "null"]
        corporationId:
          type: ["integer", "null"]
        corporationName:
          type: ["string", "null"]
        role:
          type: string
          enum: [member, fc, admin, controller]
        totalPap:
          type: number
        redeemablePap:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - totalPap
        - redeemablePap
        - createdAt

    User:
      type: object
      properties:
        id:
          type: integer
        eveCharacterId:
          type: ["integer", "null"]
        eveCharacterName:
          type: ["string", "null"]
        corporationId:
          type: ["integer", "null"]
        corporationName:
          type: ["string", "null"]
        role:
          type: string
          enum: [member, fc, admin, controller]
        totalPap:
          type: number
        redeemablePap:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - totalPap
        - redeemablePap
        - createdAt

    UpdateUserRoleBody:
      type: object
      properties:
        role:
          type: string
          enum: [member, fc, admin, controller]
      required:
        - role

    AdjustPapBody:
      type: object
      properties:
        amount:
          type: number
        reason:
          type: string
      required:
        - amount
        - reason

    Character:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        eveCharacterId:
          type: integer
        eveCharacterName:
          type: string
        corporationId:
          type: ["integer", "null"]
        corporationName:
          type: ["string", "null"]
        isMain:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - eveCharacterId
        - eveCharacterName
        - isMain
        - createdAt

    Fleet:
      type: object
      properties:
        id:
          type: integer
        eveFleetId:
          type: ["string", "null"]
        name:
          type: string
        fleetCommander:
          type: string
        papValue:
          type: number
        isActive:
          type: boolean
        startedAt:
          type: ["string", "null"]
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        participantCount:
          type: ["integer", "null"]
        battleReportId:
          type: ["integer", "null"]
      required:
        - id
        - name
        - fleetCommander
        - papValue
        - isActive
        - createdAt

    CreateFleetBody:
      type: object
      properties:
        eveFleetId:
          type: ["string", "null"]
        name:
          type: string
        fleetCommander:
          type: string
        papValue:
          type: number
        startedAt:
          type: ["string", "null"]
      required:
        - name
        - fleetCommander
        - papValue

    BattleReportSummary:
      type: object
      properties:
        id:
          type: integer
        fleetId:
          type: ["integer", "null"]
        fleetName:
          type: string
        fleetCommander:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, generating, ready, partial, failed]
        errorMessage:
          type: ["string", "null"]
        totalDestroyed:
          type: number
        totalLost:
          type: number
        damageDealt:
          type: number
        killmailCount:
          type: integer
        friendlyLosses:
          type: integer
        hostileLosses:
          type: integer
        primarySystemId:
          type: ["integer", "null"]
        primarySystemName:
